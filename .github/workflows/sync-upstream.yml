name: Sync skills desde upstream (mattpocock + ponytail)

on:
  schedule:
    - cron: "0 6 * * 1"   # lunes 6:00 UTC
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar remotos upstream
        run: |
          git remote add upstream https://github.com/mattpocock/skills.git 2>$null
          git remote add ponytail https://github.com/DietrichGebert/ponytail.git 2>$null
        shell: pwsh

      - name: Correr sync-upstream.ps1
        run: .\sync-upstream.ps1
        shell: pwsh

      - name: Crear PR si hay cambios
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "sync: skills desde mattpocock/skills y ponytail"
          title: "Sync automático de skills (upstream)"
          branch: sync/upstream-skills
          body: |
            PR automático generado por sync-upstream.ps1 — revisar el diff antes de mergear.
            Fuentes: https://github.com/mattpocock/skills/tree/main/skills/engineering y https://github.com/DietrichGebert/ponytail
